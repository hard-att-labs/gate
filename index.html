<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARD-ATT | Gate</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #0e0e0e; }
        body { background: var(--bg); color: #fff; font-family: "SF Mono", "Fira Code", monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { text-align: center; border: 1px solid #1a1a1a; padding: 2.5rem; border-radius: 24px; background: var(--card); box-shadow: 0 30px 60px rgba(0,0,0,0.8); max-width: 350px; width: 90%; position: relative; }
        .logo { width: 50px; height: 50px; margin-bottom: 1.5rem; fill: var(--neon); filter: drop-shadow(0 0 10px var(--neon)); }
        h1 { font-size: 1.4rem; margin-bottom: 0.5rem; letter-spacing: 4px; font-weight: 900; color: #fff; }
        p { color: #555; margin-bottom: 2rem; font-size: 0.75rem; line-height: 1.4; letter-spacing: 1px; }
        button { background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 0.85rem; width: 100%; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #00cc6e; transform: translateY(-1px); }
        button:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }
        #status { margin-top: 25px; font-size: 0.65rem; color: var(--neon); text-align: left; background: #000; padding: 12px; border-radius: 8px; border: 1px solid #111; min-height: 50px; word-break: break-all; line-height: 1.6; }
        .glitch { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border-radius: 24px; box-shadow: inset 0 0 20px rgba(0,255,136,0.05); }
    </style>
</head>
<body>

<div class="card">
    <div class="glitch"></div>
    <svg class="logo" viewBox="0 0 24 24"><path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
    <h1>HARD-ATT</h1>
    <p>HARDWARE-LEVEL VERIFICATION<br>DECENTRALIZED SIGNAL V1.0</p>
    <button id="authBtn">Execute Hardware Scan</button>
    <div id="status">_SYSTEM_WAITING...</div>
</div>

<script>
    const status = document.getElementById('status');
    const authBtn = document.getElementById('authBtn');

    authBtn.addEventListener('click', async () => {
        try {
            authBtn.disabled = true;
            status.innerText = "> CALLING_ENV_ENCLAVE...";
            
            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);

            const options = {
                publicKey: {
                    challenge: challenge,
                    rp: { name: "HARD-ATT", id: window.location.hostname },
                    user: {
                        id: Uint8Array.from("ID_"+Date.now(), c => c.charCodeAt(0)),
                        name: "human@hard-att.io",
                        displayName: "Verified Human"
                    },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
                    authenticatorSelection: { userVerification: "required" },
                    timeout: 60000
                }
            };

            const credential = await navigator.credentials.create(options);
            const hashBuffer = await crypto.subtle.digest('SHA-256', credential.rawId);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const token = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            status.style.color = "var(--neon)";
            status.innerHTML = `> SIG_MATCH<br>> HASH: ${token.substring(0,32)}...<br>> STATUS: HUMAN_CONFIRMED`;
            authBtn.innerText = "ACCESS_GRANTED";
            
        } catch (err) {
            authBtn.disabled = false;
            status.style.color = "#ff4444";
            status.innerText = "> ABORT_ERR: " + err.message.toUpperCase();
        }
    });
</script>
</body>
</html>
