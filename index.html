<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HARD-ATT | Trusted Attestation Layer</title>
    <style>
        :root {
            --bg: #030303;
            --accent: #00ff88;
            --text-main: #ffffff;
            --text-dim: #777777;
            --card-bg: #0c0c0c;
            --border: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container { width: 100%; max-width: 380px; animation: appIn 0.8s ease-out; }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .status-terminal {
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-terminal::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--accent);
        }

        .main-button {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }

        .main-button:active { transform: scale(0.96); }

        #result-area, #verify-area { display: none; margin-top: 20px; }

        .qr-frame {
            background: white;
            padding: 15px;
            border-radius: 18px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .qr-frame img { width: 180px; height: 180px; display: block; }

        .hash-display {
            font-family: monospace;
            font-size: 0.6rem;
            color: var(--accent);
            background: #000;
            padding: 12px;
            border-radius: 10px;
            word-break: break-all;
            border: 1px solid #111;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.6rem;
            font-weight: 900;
            margin-top: 15px;
            background: var(--accent);
            color: var(--bg);
        }

        @keyframes appIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="auth-card" id="mainCard">
        <div id="status" class="status-terminal">SYSTEM_LIVE</div>
        
        <div id="init-view">
            <h1 style="font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 30px;">HARD-ATT</h1>
            <button id="startBtn" class="main-button">AUTHENTICATE</button>
        </div>

        <div id="result-area">
            <div class="qr-frame" id="qrContainer"></div>
            <div class="hash-display" id="hashDisplay"></div>
            <div class="badge">HARDWARE_SIGNED</div>
        </div>

        <div id="verify-area">
            <h2 style="color: var(--accent);">VERIFIED_HUMAN</h2>
            <div id="verifyHash" class="hash-display" style="margin: 20px 0;"></div>
            <div style="font-size: 0.8rem; color: var(--text-dim);">Dieser Hash wurde durch eine physische Hardware-Enclave bestätigt.</div>
            <button onclick="location.href=location.pathname" class="main-button" style="margin-top: 30px; background: #222; color: #fff; font-size: 0.8rem;">BACK</button>
        </div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const initView = document.getElementById('init-view');
    const resultArea = document.getElementById('result-area');
    const verifyArea = document.getElementById('verify-area');
    const hashDisplay = document.getElementById('hashDisplay');
    const qrContainer = document.getElementById('qrContainer');

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('v')) {
        initView.style.display = 'none';
        verifyArea.style.display = 'block';
        document.getElementById('verifyHash').innerText = urlParams.get('v');
        document.getElementById('status').innerText = "VERIFICATION_MODE";
    }

    startBtn.addEventListener('click', async () => {
        try {
            startBtn.disabled = true;
            document.getElementById('status').innerText = "BIOMETRIC_CHECK...";

            const options = {
                challenge: crypto.getRandomValues(new Uint8Array(32)),
                rp: { name: "Hard-Att", id: window.location.hostname },
                user: { id: crypto.getRandomValues(new Uint8Array(16)), name: "user", displayName: "User" },
                pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
                authenticatorSelection: { userVerification: "required" }
            };

            const cred = await navigator.credentials.create({ publicKey: options });
            const hashBuf = await crypto.subtle.digest('SHA-256', cred.rawId);
            const hash = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');

            const verifyUrl = `${window.location.origin}${window.location.pathname}?v=${hash}`;
            const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(verifyUrl)}&color=000000&bgcolor=ffffff`;
            
            qrContainer.innerHTML = `<img src="${qrApi}">`;
            hashDisplay.innerText = hash;
            
            initView.style.display = 'none';
            resultArea.style.display = 'block';
            document.getElementById('status').innerText = "ATTESTATION_SUCCESS";

        } catch (e) {
            startBtn.disabled = false;
            document.getElementById('status').innerText = "FAILED";
        }
    });
</script>
</body>
</html>
