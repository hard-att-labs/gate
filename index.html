<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HARD-ATT | Ultimate Attestation Protocol</title>
<style>
:root {
--bg: #000000;
--accent: #00ff88;
--accent-dim: rgba(0, 255, 136, 0.15);
--text-main: #ffffff;
--text-dim: #666666;
--card-bg: #0a0a0a;
--border: #1a1a1a;
--error: #ff3333;
--font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
background-color: var(--bg);
color: var(--text-main);
font-family: 'Inter', -apple-system, system-ui, sans-serif;
margin: 0;
padding: 0;
display: flex;
flex-direction: column;
align-items: center;
min-height: 100vh;
overflow-x: hidden;
}
canvas#bg-canvas {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
opacity: 0.3;
}
.app-container {
width: 100%;
max-width: 420px;
padding: 40px 20px;
z-index: 1;
}
.glass-card {
background: var(--card-bg);
border: 1px solid var(--border);
border-radius: 32px;
padding: 35px;
box-shadow: 0 25px 80px rgba(0,0,0,0.8);
backdrop-filter: blur(10px);
position: relative;
overflow: hidden;
}
.glass-card::before {
content: '';
position: absolute;
top: 0; left: 0; width: 100%; height: 4px;
background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.protocol-header {
text-align: center;
margin-bottom: 30px;
}
.protocol-header h1 {
font-size: 1.6rem;
font-weight: 900;
letter-spacing: 5px;
margin: 0;
text-transform: uppercase;
background: linear-gradient(180deg, #fff, #666);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}
.status-bar {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
margin-bottom: 30px;
font-family: var(--font-mono);
font-size: 0.7rem;
color: var(--text-dim);
text-transform: uppercase;
letter-spacing: 1px;
}
.status-dot {
width: 8px;
height: 8px;
border-radius: 50%;
background: var(--text-dim);
}
.status-dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite; }
.main-btn {
background: var(--text-main);
color: var(--bg);
border: none;
width: 100%;
padding: 22px;
border-radius: 20px;
font-size: 0.95rem;
font-weight: 800;
cursor: pointer;
transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
text-transform: uppercase;
letter-spacing: 2px;
}
.main-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
.main-btn:active { transform: scale(0.98); }
.main-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
#output-section { display: none; margin-top: 30px; animation: slideUp 0.6s ease-out; }
.qr-frame {
background: #fff;
padding: 15px;
border-radius: 24px;
margin: 0 auto 25px;
width: fit-content;
}
.qr-frame img { width: 200px; height: 200px; display: block; }
.hash-container {
background: #000;
border: 1px solid #111;
padding: 15px;
border-radius: 16px;
font-family: var(--font-mono);
font-size: 0.65rem;
color: var(--accent);
word-break: break-all;
margin-bottom: 20px;
}
.audit-terminal {
background: #050505;
border: 1px solid #111;
border-radius: 16px;
padding: 20px;
font-family: var(--font-mono);
font-size: 0.6rem;
color: #444;
}
.audit-line { display: flex; justify-content: space-between; margin-bottom: 8px; }
.audit-line span:last-child { color: var(--text-dim); }
.success-badge {
background: var(--accent-dim);
color: var(--accent);
padding: 8px 16px;
border-radius: 99px;
font-size: 0.7rem;
font-weight: 700;
display: inline-block;
margin-bottom: 20px;
}
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="app-container">
<div class="glass-card">
<div class="protocol-header">
<h1>HARD-ATT</h1>
<div style="font-size: 0.7rem; color: var(--text-dim); margin-top: 5px;">ENTERPRISE ATTESTATION SUITE V1.0</div>
</div>
<div class="status-bar">
<div id="status-dot" class="status-dot active"></div>
<span id="status-text">SYSTEM_READY</span>
</div>
<div id="input-view">
<button id="startBtn" class="main-btn">INITIATE_AUTH</button>
<p style="font-size: 0.7rem; color: #444; text-align: center; margin-top: 25px; line-height: 1.5;">
Biometrische Hardware-Validierung gemäß FIDO2/WebAuthn Standards. Keine Datenspeicherung.
</p>
</div>
<div id="output-section">
<center><div class="success-badge">ATTESTATION_SUCCESS</div></center>
<div class="qr-frame" id="qrTarget"></div>
<div class="hash-container" id="hashTarget"></div>
<div class="audit-terminal">
<div class="audit-line"><span>PROTOCOL:</span><span>WEBAUTHN_L1</span></div>
<div class="audit-line"><span>CRYPTO:</span><span>SHA256_GCM</span></div>
<div class="audit-line"><span>ENCLAVE:</span><span>HW_SECURE_ELEMENT</span></div>
<div class="audit-line"><span>INTEGRITY:</span><span>VERIFIED</span></div>
</div>
<button onclick="location.reload()" class="main-btn" style="margin-top:25px; background: #111; color: #fff; font-size: 0.7rem;">TERMINATE_SESSION</button>
</div>
</div>
</div>
<script>
(function(){
const UI = {
btn: document.getElementById('startBtn'),
status: document.getElementById('status-text'),
dot: document.getElementById('status-dot'),
input: document.getElementById('input-view'),
output: document.getElementById('output-section'),
qr: document.getElementById('qrTarget'),
hash: document.getElementById('hashTarget'),
canvas: document.getElementById('bg-canvas')
};
const CONFIG = {
SALT: "HARD_ATT_ULTIMATE_2026_X",
TIMEOUT: 60000
};
const CryptoEngine = {
hash: async (str) => {
const buf = new TextEncoder().encode(str);
const hash = await crypto.subtle.digest('SHA-256', buf);
return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
},
generateChallenge: () => window.crypto.getRandomValues(new Uint8Array(32))
};
const Background = {
init: () => {
const ctx = UI.canvas.getContext('2d');
let w, h;
const resize = () => {
w = UI.canvas.width = window.innerWidth;
h = UI.canvas.height = window.innerHeight;
};
window.addEventListener('resize', resize);
resize();
const dots = Array.from({length: 50}, () => ({
x: Math.random() * w,
y: Math.random() * h,
vx: (Math.random() - 0.5) * 0.5,
vy: (Math.random() - 0.5) * 0.5
}));
function draw() {
ctx.clearRect(0, 0, w, h);
ctx.fillStyle = '#00ff88';
dots.forEach(d => {
d.x += d.vx; d.y += d.vy;
if(d.x < 0 || d.x > w) d.vx *= -1;
if(d.y < 0 || d.y > h) d.vy *= -1;
ctx.beginPath();
ctx.arc(d.x, d.y, 1, 0, Math.PI * 2);
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();
}
};
const App = {
init: () => {
Background.init();
UI.btn.addEventListener('click', App.run);
if(new URLSearchParams(window.location.search).has('v')) App.showVerify();
},
run: async () => {
try {
UI.btn.disabled = true;
UI.status.innerText = "ACCESSING_HARDWARE...";
const options = {
challenge: CryptoEngine.generateChallenge(),
rp: { name: "Hard-Att Enterprise", id: window.location.hostname },
user: { id: CryptoEngine.generateChallenge(), name: "user", displayName: "Authorized User" },
pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
authenticatorSelection: { userVerification: "required" },
timeout: CONFIG.TIMEOUT
};
const cred = await navigator.credentials.create({ publicKey: options });
UI.status.innerText = "CALCULATING_ATTESTATION...";
const timestamp = Math.floor(Date.now() / 1000);
const rawIdHex = Array.from(new Uint8Array(cred.rawId)).map(b => b.toString(16).padStart(2, '0')).join('');
const finalProof = await CryptoEngine.hash(`${rawIdHex}|${timestamp}|${CONFIG.SALT}`);
const vUrl = `${window.location.origin}${window.location.pathname}?v=${finalProof}&t=${timestamp}`;
const qrCode = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(vUrl)}&color=000000&bgcolor=ffffff`;
UI.qr.innerHTML = `<img src="${qrCode}">`;
UI.hash.innerText = finalProof;
setTimeout(() => {
UI.input.style.display = 'none';
UI.output.style.display = 'block';
UI.status.innerText = "SESSION_VERIFIED";
if(navigator.vibrate) navigator.vibrate([20, 40, 20]);
}, 600);
} catch (e) {
UI.btn.disabled = false;
UI.status.innerText = "AUTH_ERROR: " + e.name;
UI.dot.style.background = "var(--error)";
}
},
showVerify: () => {
const p = new URLSearchParams(window.location.search);
UI.input.innerHTML = `
<div style="text-align:center">
<div class="success-badge" style="background:#00ff88;color:#000">PROOF_VERIFIED</div>
<div class="hash-container">${p.get('v')}</div>
<p style="font-size:0.75rem;color:var(--text-dim)">Zeitstempel: ${new Date(p.get('t')*1000).toLocaleString()}</p>
<button onclick="location.href=location.pathname" class="main-btn" style="margin-top:20px">RESET</button>
</div>`;
UI.status.innerText = "REMOTE_VERIFICATION_ACTIVE";
}
};
App.init();
})();
</script>
</body>
</html>
