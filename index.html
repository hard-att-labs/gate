<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HARD-ATT | Hardware Attestation Service</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ff88;
            --text-main: #ffffff;
            --text-dim: #666666;
            --card-bg: #111111;
            --border: #222222;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .shield-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 30px;
            display: block;
            fill: var(--accent);
            filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.3));
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 8px;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .status-terminal {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 30px;
            height: 20px;
            overflow: hidden;
        }

        .main-button {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .main-button:active {
            transform: scale(0.98);
        }

        .main-button:disabled {
            background: var(--border);
            color: var(--text-dim);
            cursor: not-allowed;
        }

        #result-area {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            animation: fadeIn 0.6s ease-out;
        }

        .hash-box {
            background: #000;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--accent);
            word-break: break-all;
            text-align: left;
            margin-bottom: 20px;
            border: 1px dashed var(--accent);
        }

        .share-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <svg class="shield-icon" viewBox="0 0 24 24">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.47 4.34-2.85 8.24-7 9.99v-9.99z"/>
    </svg>

    <header>
        <h1>Hard-Att</h1>
        <div class="subtitle">Hardware-Level Human Verification</div>
    </header>

    <div class="auth-card">
        <div id="status" class="status-terminal">SYSTEM_READY</div>
        <button id="startBtn" class="main-button">AUTHENTIFIZIEREN</button>

        <div id="result-area">
            <div class="hash-box" id="hashDisplay"></div>
            <button id="copyBtn" class="share-btn">HASH KOPIEREN</button>
        </div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status');
    const resultArea = document.getElementById('result-area');
    const hashDisplay = document.getElementById('hashDisplay');

    startBtn.addEventListener('click', async () => {
        try {
            startBtn.disabled = true;
            statusText.innerText = "INITIALIZING_SECURE_ENCLAVE...";

            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);

            const options = {
                challenge: challenge,
                rp: { name: "Hard-Att Service", id: window.location.hostname },
                user: {
                    id: window.crypto.getRandomValues(new Uint8Array(16)),
                    name: "user@hard-att.io",
                    displayName: "Verified Human Subject"
                },
                pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
                authenticatorSelection: {
                    userVerification: "required",
                    residentKey: "preferred"
                },
                timeout: 60000
            };

            statusText.innerText = "AWAITING_BIOMETRIC_CONFIRMATION...";

            const credential = await navigator.credentials.create({ publicKey: options });

            statusText.style.color = "var(--accent)";
            statusText.innerText = "ATTESTATION_SUCCESS_MATCH";

            const hashBuffer = await crypto.subtle.digest('SHA-256', credential.rawId);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            setTimeout(() => {
                startBtn.style.display = "none";
                resultArea.style.display = "block";
                hashDisplay.innerText = hashHex;
            }, 600);

        } catch (err) {
            startBtn.disabled = false;
            statusText.style.color = "#ff4444";
            statusText.innerText = "AUTH_FAILED: " + err.name;
            console.error(err);
        }
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(hashDisplay.innerText);
        const originalText = document.getElementById('copyBtn').innerText;
        document.getElementById('copyBtn').innerText = "KOPIERT!";
        setTimeout(() => {
            document.getElementById('copyBtn').innerText = originalText;
        }, 2000);
    });
</script>

</body>
</html>
