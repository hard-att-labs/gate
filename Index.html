<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARD-ATT | Gate</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #0e0e0e; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { text-align: center; border: 1px solid #1a1a1a; padding: 2.5rem; border-radius: 24px; background: var(--card); box-shadow: 0 30px 60px rgba(0,0,0,0.8); max-width: 350px; width: 90%; }
        .logo { width: 60px; height: 60px; margin-bottom: 1.5rem; fill: var(--neon); }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; letter-spacing: 2px; font-weight: 800; }
        p { color: #666; margin-bottom: 2rem; font-size: 0.85rem; line-height: 1.4; letter-spacing: 1px; }
        button { background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 0.9rem; width: 100%; transition: all 0.3s ease; text-transform: uppercase; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,255,136,0.2); }
        #status { margin-top: 20px; font-family: monospace; font-size: 0.7rem; color: var(--neon); opacity: 0.7; min-height: 40px; word-break: break-all; }
    </style>
</head>
<body>

<div class="card">
    <svg class="logo" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 6h2v4h4v2h-4v4h-2v-4H7v-2h4V7z"/></svg>
    <h1>HARD-ATT</h1>
    <p>HARDWARE-BASED PROOF OF HUMANITY.<br>ANONYMOUS & SECURE.</p>
    <button id="authBtn">Start Hardware Scan</button>
    <div id="status">_system_ready</div>
</div>

<script>
    const status = document.getElementById('status');
    const authBtn = document.getElementById('authBtn');

    authBtn.addEventListener('click', async () => {
        status.innerText = "> INITIALIZING_BIO_LINK...";
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);

        const options = {
            publicKey: {
                challenge: challenge,
                rp: { name: "HARD-ATT", id: window.location.hostname },
                user: {
                    id: Uint8Array.from("USER_"+Date.now(), c => c.charCodeAt(0)),
                    name: "human@hard-att.io",
                    displayName: "Verified Human"
                },
                pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                authenticatorSelection: { userVerification: "required" },
                timeout: 60000
            }
        };

        try {
            const credential = await navigator.credentials.create(options);
            const hashBuffer = await crypto.subtle.digest('SHA-256', credential.rawId);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const token = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            status.style.color = "#00ff88";
            status.innerHTML = "> ATT_SUCCESS<br>> TOKEN: " + token.substring(0,24) + "...";
            authBtn.innerText = "VERIFIED";
            authBtn.style.background = "#1a1a1a";
            authBtn.style.color = "#00ff88";
        } catch (err) {
            status.style.color = "#ff4444";
            status.innerText = "> ERR: " + err.message;
        }
    });
</script>
</body>
</html>
